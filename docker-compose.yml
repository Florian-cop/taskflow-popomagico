services:
  web:
    build:
      context: ./taskflow-web
      args:
        NUXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./taskflow-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-taskflow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-taskflow}
      DB_NAME: ${POSTGRES_DB:-taskflow}
      API_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
